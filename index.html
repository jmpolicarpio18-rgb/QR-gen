<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel form-panel">
      <h1>QR Creator</h1>
      <p class="subtitle">Create QR codes for website links, social media, and calling cards.</p>

      <div class="field">
        <label for="qrType">QR Type</label>
        <select id="qrType">
          <option value="website">Website Link</option>
          <option value="social">Social Media</option>
          <option value="vcard">Calling Card (vCard)</option>
        </select>
      </div>

      <div id="dynamicFields"></div>

      <div class="actions">
        <button id="generateBtn" type="button">Generate QR</button>
        <button id="downloadBtn" type="button" disabled>Download PNG</button>
      </div>
    </section>

    <section class="panel preview-panel">
      <h2>Preview</h2>
      <div id="qrcodeWrap">
        <div id="qrcode"></div>
      </div>
      <article id="virtualCard" class="virtual-card hidden" aria-live="polite">
        <img id="cardLogo" class="card-logo" src="assets/logo.png" alt="Company logo" />
        <header class="virtual-card-header">
          <div class="card-identity">
            <div id="cardInitials" class="card-avatar">VC</div>
            <div>
              <h3 id="cardName">Your Name</h3>
              <p id="cardTitle">Job Title</p>
            </div>
          </div>
        </header>
        <p id="cardCompany" class="card-company">Your Company</p>
        <p id="cardPhone" class="card-line">Phone: Not set</p>
        <p id="cardEmail" class="card-line">Email: Not set</p>
        <p id="cardAddress" class="card-line">Address: Not set</p>
        <p id="cardWebsite" class="card-line">Website: Not set</p>
        <div id="cardWebsiteQR" class="card-website-qr" aria-label="Website QR"></div>
      </article>
      <p id="encodedText">Status: Completed</p>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
